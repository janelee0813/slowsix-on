<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>관리자 모드</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net"/>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={
  theme:{
    extend:{
      fontFamily:{sans:['Pretendard Variable','Pretendard','-apple-system','BlinkMacSystemFont','Apple SD Gothic Neo','Segoe UI','Roboto','sans-serif']},
      colors:{
        background:'#0a0612',surface:'#15101f',
        foreground:'#f5f1ff',muted:'#1a1428','muted-foreground':'#9b94b3',
        border:'rgba(140,110,200,0.22)',
        'neon-purple':'#b566ff','neon-pink':'#ff5fb0','neon-blue':'#5ec8ff',
        destructive:'#ff5f6d',
      }
    }
  }
}
</script>
<style>
html{background:#0a0612;color-scheme:dark}
body{background:#0a0612;color:#f5f1ff;font-family:'Pretendard Variable','Pretendard',-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
.neon-card{position:relative;background:linear-gradient(180deg,rgba(28,21,48,0.85),rgba(21,16,31,0.7));border:1px solid rgba(140,110,200,0.28);backdrop-filter:blur(8px);border-radius:1rem}
.neon-card-glow::before{content:"";position:absolute;inset:-1px;border-radius:inherit;padding:1px;background:linear-gradient(135deg,rgba(181,102,255,0.7),rgba(255,95,176,0.4),rgba(94,200,255,0.6));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.grid-bg{background-image:radial-gradient(circle at 20% 0%,rgba(181,102,255,0.18),transparent 45%),radial-gradient(circle at 80% 10%,rgba(255,95,176,0.14),transparent 50%),radial-gradient(circle at 50% 100%,rgba(94,200,255,0.12),transparent 55%)}
.form-input{width:100%;padding:9px 12px;border:1px solid rgba(140,110,200,0.28);border-radius:8px;font-size:14px;background:rgba(10,6,18,0.6);color:#f5f1ff;outline:none;transition:border-color .15s,box-shadow .15s;font-family:inherit}
.form-input:focus{border-color:#b566ff;box-shadow:0 0 0 3px rgba(181,102,255,0.18)}
.form-input::placeholder{color:#6b6480}
.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:10px;background:linear-gradient(135deg,#b566ff,#ff5fb0);color:#0a0612;font-size:13px;font-weight:700;border:none;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-primary:hover{filter:brightness(1.08)}
.btn-primary:disabled{opacity:.6;cursor:default}
</style>
</head>
<body class="min-h-screen">

<!-- 로그인 화면 -->
<div id="login-page" class="min-h-screen flex items-center justify-center px-4">
  <div class="grid-bg fixed inset-0 -z-10"></div>
  <div class="w-full max-w-sm">
    <a href="/" class="inline-flex items-center gap-2 text-sm text-muted-foreground hover:text-neon-purple transition-colors mb-8">
      ← 가이드로 돌아가기
    </a>
    <div class="neon-card neon-card-glow p-7">
      <div class="text-center mb-7">
        <h1 class="text-xl font-bold text-foreground tracking-tight">관리자 모드</h1>
        <p class="mt-1.5 text-xs text-muted-foreground">PIN 번호를 입력해주세요.</p>
      </div>
      <div class="space-y-4">
        <input id="login-pw" type="password" inputmode="numeric" maxlength="6" class="form-input" placeholder="PIN 번호"
          onkeydown="if(event.key==='Enter')doLogin()"/>
        <div id="login-error" class="hidden rounded-lg bg-destructive/10 border border-destructive/30 px-3 py-2 text-xs text-destructive font-medium">
          PIN이 올바르지 않습니다.
        </div>
        <button onclick="doLogin()" id="login-btn" class="btn-primary w-full py-3 text-sm rounded-xl">입장</button>
      </div>
    </div>
  </div>
</div>

<!-- 관리자 페이지 -->
<div id="admin-page" class="hidden min-h-screen">
  <div class="flex items-center justify-between px-5 py-4 border-b border-border">
    <span class="text-sm font-bold text-foreground">관리자 모드</span>
    <button onclick="doLogout()" class="text-xs text-muted-foreground hover:text-neon-purple transition-colors">로그아웃</button>
  </div>

  <div class="mx-auto max-w-screen-lg px-5 py-6">
    <div class="mb-5 flex items-center justify-between">
      <h1 class="text-lg font-bold text-foreground">미니 홀덤대회 신청자</h1>
      <div class="flex items-center gap-2">
        <span id="ap-admin-count" class="text-xs text-muted-foreground"></span>
        <button onclick="loadApplications()" class="rounded-full border border-border px-3 py-1.5 text-xs text-foreground/90 transition-colors hover:border-neon-purple/50 hover:text-neon-purple">새로고침</button>
      </div>
    </div>

    <div id="ap-admin-empty" class="hidden neon-card p-8 text-center text-sm text-muted-foreground">아직 신청자가 없어요.</div>

    <div id="ap-admin-list" class="space-y-3"></div>
  </div>
</div>

<script>
const ADMIN_PIN = '505050';
const sb = window.supabase.createClient(
  'https://teugnaahpcpzejbdayyy.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRldWduYWFocGNwemVqYmRheXl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NzkwMzIsImV4cCI6MjA5MzM1NTAzMn0.cbIoK_4DpEacggY5kDVRO799h_z-VtMjADyya2EF1SA'
);

function doLogin(){
  const pw = document.getElementById('login-pw').value;
  const errEl = document.getElementById('login-error');

  if (pw !== ADMIN_PIN) {
    errEl.classList.remove('hidden');
    return;
  }
  errEl.classList.add('hidden');
  sessionStorage.setItem('admin-authed', '1');
  showAdminPage();
}

function doLogout(){
  sessionStorage.removeItem('admin-authed');
  location.reload();
}

function showAdminPage(){
  document.getElementById('login-page').classList.add('hidden');
  document.getElementById('admin-page').classList.remove('hidden');
  loadApplications();
}

function escHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

const AP_STATUS_LABEL = { pending: '대기중', confirmed: '확정', waitlisted: '보류', cancelled: '취소' };
const AP_STATUS_COLOR = { pending: '#9b94b3', confirmed: '#5ee0a8', waitlisted: '#ffb547', cancelled: '#ff5f6d' };

async function loadApplications(){
  const listEl = document.getElementById('ap-admin-list');
  const emptyEl = document.getElementById('ap-admin-empty');
  const countEl = document.getElementById('ap-admin-count');
  listEl.innerHTML = '<p class="text-sm text-muted-foreground">불러오는 중...</p>';

  const { data, error } = await sb.from('holdem_applications').select('*').order('created_at', { ascending: false });

  if (error) {
    listEl.innerHTML = '<p class="text-sm text-destructive">불러오기 실패: ' + escHtml(error.message) + '</p>';
    return;
  }

  countEl.textContent = '총 ' + data.length + '명';

  if (!data.length) {
    listEl.innerHTML = '';
    emptyEl.classList.remove('hidden');
    return;
  }
  emptyEl.classList.add('hidden');

  listEl.innerHTML = data.map(row => {
    const st = row.status || 'pending';
    const dt = new Date(row.created_at);
    const dtStr = (dt.getMonth() + 1) + '/' + dt.getDate() + ' ' + String(dt.getHours()).padStart(2, '0') + ':' + String(dt.getMinutes()).padStart(2, '0');
    return `
    <div class="neon-card p-4 sm:p-5">
      <div class="flex flex-wrap items-center justify-between gap-2">
        <div class="flex items-center gap-2">
          <span class="text-sm font-bold text-foreground">${escHtml(row.name)}</span>
          <span class="text-xs text-muted-foreground">(${escHtml(row.gender)} · ${row.birth_year}년생)</span>
        </div>
        <span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;border:1px solid ${AP_STATUS_COLOR[st]};color:${AP_STATUS_COLOR[st]}">${AP_STATUS_LABEL[st] || st}</span>
      </div>
      <div class="mt-2 grid grid-cols-2 gap-x-4 gap-y-1 text-xs text-muted-foreground sm:grid-cols-4">
        <div>연락처: <span class="text-foreground/90">${escHtml(row.phone)}</span></div>
        <div>홀덤 경험: <span class="text-foreground/90">${escHtml(row.experience)}</span></div>
        <div>카톡 닉네임: <span class="text-foreground/90">${escHtml(row.kakao_nick)}</span></div>
        <div>신청 시각: <span class="text-foreground/90">${dtStr}</span></div>
      </div>
      ${row.note ? `<div class="mt-2 text-xs text-muted-foreground">문의: <span class="text-foreground/90">${escHtml(row.note)}</span></div>` : ''}
      <div class="mt-3 flex flex-wrap gap-1.5">
        <button onclick="setStatus(${row.id},'confirmed')" class="rounded-full border border-border px-3 py-1 text-[11px] text-foreground/90 transition-colors hover:border-neon-purple/50 hover:text-neon-purple">확정</button>
        <button onclick="setStatus(${row.id},'waitlisted')" class="rounded-full border border-border px-3 py-1 text-[11px] text-foreground/90 transition-colors hover:border-neon-purple/50 hover:text-neon-purple">대기</button>
        <button onclick="setStatus(${row.id},'cancelled')" class="rounded-full border border-border px-3 py-1 text-[11px] text-foreground/90 transition-colors hover:border-neon-purple/50 hover:text-neon-purple">취소</button>
      </div>
    </div>`;
  }).join('');
}

async function setStatus(id, status){
  await sb.from('holdem_applications').update({ status }).eq('id', id);
  loadApplications();
}

window.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem('admin-authed') === '1') showAdminPage();
});
</script>
</body>
</html>
